<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.J.BotCreate | Заказать</title>
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-green: #2E7D32;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #0088cc, #2E7D32, #ffffff, #e3f2fd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .price-box {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #f0f0f0;
        }
        .price-value { font-size: 1.8em; font-weight: 900; display: block; color: #000; }

        .btn {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 1.1em;
            transition: 0.3s;
        }
        .btn-bot { background: var(--tg-blue); }
        .btn-site { background: var(--tg-green); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 10000;
        }
        .modal-content {
            background: white;
            margin: 10vh auto;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            position: relative;
            text-align: center;
        }

        .quiz-q { font-size: 1.4em; margin-bottom: 25px; display: block; font-weight: bold; }
        .ans-btns { display: flex; gap: 15px; }
        .btn-ans { 
            flex: 1; padding: 18px; border-radius: 15px; border: 2px solid #eee; 
            background: #f9f9f9; font-weight: bold; cursor: pointer;
        }
        .btn-ans:hover { border-color: var(--tg-blue); background: #e3f2fd; }

        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }

        footer { text-align: center; padding: 30px; font-weight: bold; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">M.J.BotCreate</h1>
</header>

<div class="container">
    <div class="card">
        <h2 style="margin-bottom: 30px;">Выберите проект</h2>
        <div class="price-grid">
            <div class="price-box" style="border-top: 6px solid var(--tg-blue);">
                <span class="price-value">от 599₽</span>
<strong style="color: var(--tg-blue);">TG Бот</strong>
            </div>
            <div class="price-box" style="border-top: 6px solid var(--tg-green);">
                <span class="price-value">от 999₽</span>
                <strong style="color: var(--tg-green);">HTML Сайт</strong>
            </div>
        </div>
        
        <button class="btn btn-bot" onclick="startQuiz('Бот')">Купить телеграмм бот</button>
        <button class="btn btn-site" onclick="startQuiz('Сайт')">Купить сайт</button>
    </div>
</div>

<footer>Связь: @Maks_BotDisign</footer>

<div id="modalWindow" class="modal">
    <div class="modal-content">
        <div id="quizContent"></div>

        <div id="finalForm" style="display:none;">
            <h3 class="quiz-q">Детали заказа</h3>
            <textarea id="userTask" placeholder="Опишите ваш проект"></textarea>
            <input type="text" id="userBudget" placeholder="Ваш бюджет (₽)">
            <input type="text" id="userContact" placeholder="Ваш @Telegram">
            <button class="btn btn-bot" onclick="finalSubmit()">Отправить</button>
        </div>
        
        <p onclick="closeModal()" style="color:#aaa; cursor:pointer; margin-top:20px;">Отмена</p>
    </div>
</div>

<script>
    const BOT_TOKEN = '8670744972:AAEDH9nYmU16UYVVZYpODT5NHmnoL6zkIo4';
    const MY_ID = '5524332676';

    const questions = {
        'Бот': ["Нужны кнопки?", "Нужна оплата?", "Нужна база данных?", "Нужна рассылка?", "Нужна админка?", "Нужен сервер?"],
        'Сайт': ["Нужен дизайн?", "Нужна адаптация?", "Нужны кнопки связи?", "Нужна анимация?", "Нужен домен?", "Нужен текст?"]
    };

    let currentType = '';
    let currentStep = 0;
    let answers = [];

    function startQuiz(type) {
        currentType = type;
        currentStep = 0;
        answers = [];
        document.getElementById('modalWindow').style.display = 'block';
        document.getElementById('finalForm').style.display = 'none';
        document.getElementById('quizContent').style.display = 'block';
        renderQuestion();
    }

    function closeModal() {
        document.getElementById('modalWindow').style.display = 'none';
    }

    function renderQuestion() {
        const qList = questions[currentType];
        const container = document.getElementById('quizContent');

        if (currentStep < qList.length) {
            container.innerHTML = 
                <p style="color:#888;">Вопрос ${currentStep + 1} / ${qList.length}</p>
                <span class="quiz-q">${qList[currentStep]}</span>
                <div class="ans-btns">
                    <button class="btn-ans" onclick="nextStep('Да')">Да</button>
                    <button class="btn-ans" onclick="nextStep('Нет')">Нет</button>
                </div>
            ;
        } else {
            container.style.display = 'none';
            document.getElementById('finalForm').style.display = 'block';
        }
    }

    function nextStep(val) {
        answers.push(questions[currentType][currentStep] + ": " + val);
        currentStep++;
        renderQuestion();
    }

    async function finalSubmit() {
        const task = document.getElementById('userTask').value;
        const budget = document.getElementById('userBudget').value;
        const contact = document.getElementById('userContact').value;

        if (!task  !budget  !contact) return alert("Заполни все поля!");

        const message = 🚀 ЗАКАЗ: ${currentType}\n\n${answers.join('\n')}\n\nТЗ: ${task}\nБюджет: ${budget}\nКонтакт: ${contact};

        try {
            await fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendMessage, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: MY_ID, text: message})
            });
            alert("Заявка отправлена!");
            location.reload();
        } catch (e) {
            alert("Ошибка отправки! Убедитесь, что вы зашли с хостинга (GitHub) или у вас есть интернет.");
        }
    }
</script>
</body>
</html>
